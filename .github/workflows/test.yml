name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn lint
      - run: yarn typecheck

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn test
      - run: yarn test:coverage
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  e2e-tests:
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, unit-tests]
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: corepack enable
      - run: yarn install --immutable
      - name: Check E2E secrets
        id: check-secrets
        run: |
          if [[ -n "$PUBLIC_STOREFRONT_API_TOKEN" && -n "$PRIVATE_STOREFRONT_API_TOKEN" && -n "$PUBLIC_STORE_DOMAIN" && -n "$PUBLIC_STOREFRONT_ID" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          PUBLIC_STOREFRONT_API_TOKEN: ${{ secrets.PUBLIC_STOREFRONT_API_TOKEN }}
          PRIVATE_STOREFRONT_API_TOKEN: ${{ secrets.PRIVATE_STOREFRONT_API_TOKEN }}
          PUBLIC_STORE_DOMAIN: ${{ secrets.PUBLIC_STORE_DOMAIN }}
          PUBLIC_STOREFRONT_ID: ${{ secrets.PUBLIC_STOREFRONT_ID }}
      - name: Skip E2E when secrets are unavailable
        if: steps.check-secrets.outputs.should_run != 'true'
        run: echo "Skipping E2E tests: required storefront secrets are not configured."
      - name: Install Playwright browsers
        if: steps.check-secrets.outputs.should_run == 'true'
        run: npx playwright install --with-deps chromium firefox webkit
      - name: Create CI env file for web server
        if: steps.check-secrets.outputs.should_run == 'true'
        run: |
          SESSION_SECRET_VALUE="${SESSION_SECRET:-ci-session-secret}"
          cat > .env <<EOF
          SESSION_SECRET=${SESSION_SECRET_VALUE}
          PUBLIC_STOREFRONT_API_TOKEN=${PUBLIC_STOREFRONT_API_TOKEN}
          PRIVATE_STOREFRONT_API_TOKEN=${PRIVATE_STOREFRONT_API_TOKEN}
          PUBLIC_STORE_DOMAIN=${PUBLIC_STORE_DOMAIN}
          PUBLIC_STOREFRONT_ID=${PUBLIC_STOREFRONT_ID}
          PUBLIC_STOREFRONT_API_VERSION=2025-04
          EOF
        env:
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          PUBLIC_STOREFRONT_API_TOKEN: ${{ secrets.PUBLIC_STOREFRONT_API_TOKEN }}
          PRIVATE_STOREFRONT_API_TOKEN: ${{ secrets.PRIVATE_STOREFRONT_API_TOKEN }}
          PUBLIC_STORE_DOMAIN: ${{ secrets.PUBLIC_STORE_DOMAIN }}
          PUBLIC_STOREFRONT_ID: ${{ secrets.PUBLIC_STOREFRONT_ID }}
      - name: Run E2E + responsive + visual tests
        if: steps.check-secrets.outputs.should_run == 'true'
        run: npx playwright test --shard=${{ matrix.shard }}/2
      - name: Upload Playwright report
        if: steps.check-secrets.outputs.should_run == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.shard }}
          path: playwright-report/
          retention-days: 14
