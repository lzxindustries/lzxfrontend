    <path d="M8 32 Q16 16 24 32 Q32 48 40 32 Q48 16 56 32" opacity="1"/>
    <path d="M8 32 Q16 22 24 32 Q32 42 40 32 Q48 22 56 32" opacity="0.5"/>

    <!-- Stage/monitor bracket -->
