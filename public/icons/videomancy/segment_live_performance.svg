    <!-- Radiating lines from center (performance energy) -->
    <line x1="32" y1="8" x2="32" y2="14"/>
    <line x1="20" y1="12" x2="23" y2="17"/>
    <line x1="44" y1="12" x2="41" y2="17"/>
