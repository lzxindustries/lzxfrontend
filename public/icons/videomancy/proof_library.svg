<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="lib-grad" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FCF3D0"/>
      <stop offset="100%" stop-color="#FCF3D0"/>
    </linearGradient>
  </defs>

  <g fill="none" stroke="url(#lib-grad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- 3×3 grid of program cards -->
    <rect x="6" y="6" width="10" height="10" rx="2"/>
    <rect x="19" y="6" width="10" height="10" rx="2"/>
    <rect x="32" y="6" width="10" height="10" rx="2"/>

    <rect x="6" y="19" width="10" height="10" rx="2"/>
    <rect x="19" y="19" width="10" height="10" rx="2"/>
    <rect x="32" y="19" width="10" height="10" rx="2"/>

    <rect x="6" y="32" width="10" height="10" rx="2"/>
    <rect x="19" y="32" width="10" height="10" rx="2"/>

    <!-- Expanding/growing indicator (+ icon in last cell) -->
    <rect x="32" y="32" width="10" height="10" rx="2" stroke-dasharray="3,2"/>
    <line x1="37" y1="34.5" x2="37" y2="39.5"/>
    <line x1="34.5" y1="37" x2="39.5" y2="37"/>
  </g>
</svg>
