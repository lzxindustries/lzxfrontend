<?xml version="1.0" encoding="UTF-8"?>
<!--
  Videomancy Web Campaign — Segment Icon: Format Bridge
  Template: Editable placeholder — replace paths with final design
  Spec: 64×64, Moonwax #FCF3D0, abstract bidirectional arrows motif
  Copyright (C) 2026 LZX Industries LLC. All Rights Reserved.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="fb-grad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FCF3D0"/>
      <stop offset="100%" stop-color="#FCF3D0"/>
    </linearGradient>
  </defs>

  <!-- Bidirectional bridge motif (analog ⇌ digital) -->
  <g fill="none" stroke="url(#fb-grad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left connector (analog - rounded/organic shape) -->
    <circle cx="16" cy="32" r="8"/>
    <line x1="16" y1="24" x2="16" y2="18"/>
    <line x1="16" y1="40" x2="16" y2="46"/>

    <!-- Right connector (digital - square/geometric shape) -->
    <rect x="40" y="24" width="16" height="16" rx="2"/>
    <line x1="48" y1="24" x2="48" y2="18"/>
    <line x1="48" y1="40" x2="48" y2="46"/>

    <!-- Bidirectional arrows -->
    <line x1="24" y1="28" x2="40" y2="28"/>
    <polyline points="36,24 40,28 36,32"/>

    <line x1="40" y1="36" x2="24" y2="36"/>
    <polyline points="28,32 24,36 28,40"/>
  </g>

  <!-- Signal dots along bridge -->
  <g fill="#FCF3D0" opacity="0.5">
    <circle cx="30" cy="28" r="1.5"/>
    <circle cx="34" cy="36" r="1.5"/>
  </g>
</svg>
