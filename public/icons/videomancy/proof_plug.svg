<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="pp-grad" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FCF3D0"/>
      <stop offset="100%" stop-color="#FCF3D0"/>
    </linearGradient>
  </defs>

  <g fill="none" stroke="url(#pp-grad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- HDMI-style connector body -->
    <path d="M14 12 L34 12 L38 16 L38 32 L34 36 L14 36 L10 32 L10 16 Z"/>

    <!-- Connector pins -->
    <line x1="18" y1="18" x2="18" y2="28"/>
    <line x1="24" y1="16" x2="24" y2="30"/>
    <line x1="30" y1="18" x2="30" y2="28"/>

    <!-- Cable going down -->
    <path d="M24 36 L24 44"/>
    <circle cx="24" cy="44" r="2"/>

    <!-- Signal emission (right side) -->
    <path d="M40 20 Q44 24 40 28" opacity="0.6"/>
    <path d="M42 18 Q48 24 42 30" opacity="0.3"/>
  </g>
</svg>
